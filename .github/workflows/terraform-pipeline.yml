name: UP Terraform CI/CD Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  AWS_REGION: us-west-2
  TF_VERSION: 1.5.0

jobs:
  terraform-dev:
    name: "Deploy to Dev"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init - Dev
        working-directory: up-terraform/environments/dev
        run: terraform init

      - name: Terraform Plan - Dev
        working-directory: up-terraform/environments/dev
        run: terraform plan -out=dev.tfplan -var="db_password=UPprod2024!"

      - name: Terraform Apply - Dev
        working-directory: up-terraform/environments/dev
        run: terraform apply -auto-approve dev.tfplan

  terraform-uat:
    name: "Deploy to UAT"
    runs-on: ubuntu-latest
    needs: terraform-dev
    environment: uat-approval
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init - UAT
        working-directory: up-terraform/environments/uat
        run: terraform init

      - name: Terraform Plan - UAT
        working-directory: up-terraform/environments/uat
        run: terraform plan -out=uat.tfplan -var="db_password=UPprod2024!"

      - name: Terraform Apply - UAT
        working-directory: up-terraform/environments/uat
        run: terraform apply -auto-approve uat.tfplan

  terraform-prod:
    name: "Deploy to Prod"
    runs-on: ubuntu-latest
    needs: terraform-uat
    environment: prod-approval
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init - Prod
        working-directory: up-terraform/environments/prod
        run: terraform init

      - name: Terraform Plan - Prod
        working-directory: up-terraform/environments/prod
        run: terraform plan -out=prod.tfplan -var="db_password=UPprod2024!"

      - name: Terraform Apply - Prod
        working-directory: up-terraform/environments/prod
        run: terraform apply -auto-approve prod.tfplan
